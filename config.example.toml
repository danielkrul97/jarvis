# Jarvis — vzorová konfigurace.
# Zkopíruj do ~/.config/jarvis/config.toml a uprav; chybějící hodnoty = defaults níže.
# API klíč patří VÝHRADNĚ do ~/.config/jarvis/secrets.env (SENDGRID_API_KEY=...), ne sem.

[capture]
meta_interval_s = 10        # vzorek metadat aktivního okna
shot_interval_s = 60        # pokus o screenshot
idle_threshold_s = 120      # nad tuto neaktivitu se nesnímá
max_dimension = 1568        # delší strana snímku po zmenšení (limit Anthropic vision)
phash_min_distance = 7      # minimální Hamming vzdálenost dHash, aby se snímek uložil
blacklist_class = ["(?i)keepass", "(?i)bitwarden", "(?i)1password"]
blacklist_title = ["(?i)anonymní", "(?i)incognito", "(?i)private browsing", "(?i)soukromé prohlížení", "(?i)bank"]

[analysis]
max_images_per_run = 8
model = "claude-haiku-4-5-20251001"
daily_budget_usd = 1.0      # denní strop; po překročení analýza běží lokálně (titulky-only)
send_images = true          # false = žádný snímek neopustí stroj, analýza jen z titulků
timeout_s = 600

[digest]
hour = 19                   # lokální čas (systemd timer i `jarvis run` používají lokální čas)
model = ""                  # prázdné = výchozí model claude CLI

[email]
to = "dankrul.krul@gmail.com"
from = "dankrul.krul@gmail.com"   # musí být verifikovaný odesílatel v SendGrid (Single Sender Verification)
from_name = "Jarvis"
subject_prefix = "Jarvis digest"

[listen]
enabled = true              # poslech mikrofonu (near-realtime přepis řeči do DB)
pause_when_locked = true    # neposlouchat, když je aktivní zámek/šetřič obrazovky
                            # (XFCE screensaver přes D-Bus); netýká se `jarvis meet`
engine = "auto"             # auto = ElevenLabs Scribe (cloud), při chybě lokální whisper;
                            # "elevenlabs" = jen Scribe; "whisper" = jen lokálně (zdarma,
                            # nic neopouští stroj, ale náročné na CPU/GPU). V "auto" se
                            # whisper načte až při prvním fallbacku (líně).
scribe_model = "scribe_v2"  # ElevenLabs Scribe model (scribe_v2 = nejnižší WER | scribe_v1); ~0,22 $/h
scribe_keyterms = ["Jarvis", "Jarvisi"]  # biasing Scribe na vlastní jména (jinak slyší
                            # "Jarvisi" jako "Já vysí" a oslovení nezabere); [] = neposílat
device = ""                 # PulseAudio source (`pactl list sources short`); prázdné = výchozí
# Self-healing: příkaz spuštěný, když `device` v PulseAudiu CHYBÍ. Typicky reload
# module-echo-cancel, který se rozpadne s odpojeným USB micem po uspání počítače
# (zmizí source_master → sink jarvis_out i source jarvis_denoised → poslech oněmí).
# Poslechová smyčka příkaz zavolá a zkusí zdroj vrátit (rate-limit ~15 s). Prázdné
# = vypnuto. Běží přes `sh -c`. Pozor na quoting aec_args (má mezeru) — celý
# argument modulu jako JEDEN uvozovkovaný řetězec (viz vnořené '…"…"…').
device_heal_cmd = ""
# příklad (HyperX SoloCast, ~/.config/pulse/default.pa echo-cancel):
# device_heal_cmd = '''pactl load-module module-echo-cancel 'aec_method=webrtc aec_args="analog_gain_control=0 digital_gain_control=1" source_master=alsa_input.usb-HP__Inc_HyperX_SoloCast-00.analog-stereo source_name=jarvis_denoised source_properties=device.description=JarvisDenoised sink_name=jarvis_out sink_properties=device.description=JarvisOut' '''
model = "large-v3-turbo-q5_0"  # whisper ggml model (fallback; CUDA build, ~0.6 GB VRAM);
                            # bez GPU přepni na "small-q5_1" (turbo na CPU nestíhá)
model_path = ""             # explicitní cesta k .bin (přebíjí `model`)
language = "cs"             # pinnutý jazyk; "auto" = detekce per promluva (2–3× pomalejší)
hint = "Slovník: Jarvis, Jarvisi, ElevenLabs, digest."  # slovník pro whisper — vlastní
                            # jména, která jinak komolí; prázdné = bez nápovědy; držet
                            # slovníkový styl (halucinovaný hint nesmí znít jako oslovení)
threads = 0                 # vlákna whisperu; 0 = auto (polovina jader, max 8)
min_speech_ms = 300         # kratší zvuky se zahazují (kliknutí, ťukání)
silence_ms = 480            # tolik ticha ukončí promluvu (nižší = svižnější; pod ~400 seká věty s nádechem)
max_utterance_s = 28        # delší řeč se rozdělí (whisper okno je 30 s)
vad_speech_mult = 2.0       # práh řeči = šumové dno × tohle; menší = citlivější
                            # (2.0 pro tichý mikrofon; 3.0 v hlučném prostředí)

[speak]
enabled = true              # hlasový výstup (ElevenLabs; klíč ELEVENLABS_API_KEY v secrets.env)
engine = "auto"             # auto = ElevenLabs, při chybě lokální piper; "piper" = jen
                            # lokálně (zdarma, nic neopouští stroj); "elevenlabs" = bez zálohy
piper_bin = "piper"         # lokální TTS binárka (pip3 install --user piper-tts)
piper_voice = "cs_CZ-jirka-medium"  # český hlas; stáhne `jarvis say --download-model`
voice_id = "JBFqnCBsd6RMkjVDRZzb"  # „George" — teplý britský vypravěč (premade, funguje
                            # i se scoped klíčem); brumbálovštější hlas: vyber ve Voice
                            # Library na webu, přidej do účtu a vlož ID sem
model_id = "eleven_flash_v2_5"  # nízká latence + vynucení language_code; nejteplejší
                            # (ale pomalejší) čeština: eleven_multilingual_v2
language = "cs"             # vynucení jazyka umí jen *_v2_5 modely; multilingual_v2
                            # češtinu pozná z textu sám
output_format = "mp3_44100_128"
stream = true               # streamovat audio rovnou do přehrávače (řeč začne po prvním
                            # chunku, ne po celém mp3); vyžaduje ffplay/mpv, jinak buffer
stability = 0.5             # 0–1; nižší = expresivnější přednes
similarity_boost = 0.75     # 0–1; věrnost hlasu
style = 0.0                 # 0–1; u češtiny nechat 0 (vyšší deformuje výslovnost)
speaker_boost = true
speed = 0.95                # 0.7–1.2; Brumbál nespěchá
player = ""                 # prázdné = auto (ffplay → mpv → ffmpeg+paplay)
sink = ""                   # PulseAudio sink pro řeč; sink echo-cancel modulu (např.
                            # "jarvis_out") dá AEC referenci → Jarvis neslyší sám sebe
announce_digest = true      # po odeslání digestu ho Jarvis ohlásí nahlas
cache = true                # stejná fráze se generuje jen jednou (šetří kredity)
max_chars = 2500            # pojistka: 1 znak = 1 kredit

[converse]
enabled = true              # hlasový dialog: „Jarvisi, …" → Claude → odpověď nahlas
wake_words = ["jarvisi", "jarvise"]  # kmeny oslovení (vokativ záměrně — řeč O jarvisovi
                            # dialog nespouští; volnější spouštění: přidej "jarvis")
wake_fuzzy = true           # tolerance 1 chyby přepisu („Javi si" ≈ „Jarvisi"); false = přesně
open_ear = "followup"       # odpovídat bez wake-wordu: "off" (jen na jméno) | "followup" (krátké
                            # okno po odpovědi) | "always" (klasifikátor posoudí každou větu; experiment)
                            # Bez oslovení jménem (followup i always) rozhodne skeptická brána
                            # (gate_model), jestli promluva mířila na Jarvise — jinak mlčí.
followup_window_s = 12      # jak dlouho po Jarvisově odpovědi drží follow-up okno (s)
open_ear_min_words = 2      # promluvu bez jména kratší než tolik slov ignorovat („ehm", „jo")
model = "claude-haiku-4-5-20251001"  # rychlý model; sdílí strop analysis.daily_budget_usd
gate_model = "claude-haiku-4-5-20251001"  # levný klasifikátor „mířilo to na mě?" PŘED drahým
                            # `model`; běží na každý kandidát bez jména. "" = použij `model`
ack = ["Ano, pane?", "Poslouchám, pane.", "K službám, pane.", "Copak, pane?", "Přejete si, pane?", "Jsem tu, pane."]
                            # okamžitá reakce na oslovení; vybírá se z listu náhodně.
                            # Necháš-li řádek být, použije se výchozí (delší,
                            # ~18 frází) zabudovaný list; smí být i jediný řetězec; "" / [] = bez acku
max_context_exchanges = 3   # kolik minulých výměn se přikládá pro návaznost
max_turns = 12              # kola agenta při akcích s okny ([wm] enabled); bez nich je vždy 1
timeout_s = 90
respect_budget = true       # false = strop konverzace neblokuje (útrata se dál jen eviduje)
warm = true                 # rezidentní claude proces: odpověď bez CLI startu (~2 s úspora),
                            # session = konverzační paměť; při chybě fallback na cold spawn
warm_max_exchanges = 10     # recyklace session (akumuluje kontext → rostly by input tokeny)
warm_idle_s = 900           # recyklace po 15 min ticha
web = true                  # agent smí WebSearch/WebFetch — aktuální počasí/zprávy/kurzy
                            # (web search ~0,01 $/dotaz); false = jen z natrénovaných znalostí
barge_in = true             # mluv a Jarvis přestane mluvit. „Jarvisi …" přeruší vždy; přerušení
                            # bez oslovení jede jen s AEC (speak.sink na echo-cancel sink), jinak
                            # by skákal do vlastní ozvěny. false = řeč se nedá přerušit
barge_in_ms = 250           # kolik ms souvislé řeči spustí tiché (akustické) přerušení; nižší =
                            # pohotovější, ale citlivější na krátké ruchy
filler_after_s = 7          # když od acku uběhne tolik s a odpověď ještě nezačala (agentní
                            # wm/web akce, pomalý model), Jarvis vsune citoslovce a opakuje;
                            # 0 = vypnuto. Barge-in i začátek odpovědi ho utnou
filler = ["Ještě chvilku, pane…", "Okamžik, pane…", "Už na tom pracuji…", "Ještě moment…"]
                            # fráze fillerů (náhodně); smí být i jediný řetězec
reprompt = ["Promiňte, pane, nerozuměl jsem. Zopakujete to?", "Prosím, pane?"]
                            # když po oslovení nezazní věcná otázka (jen jméno / jméno + „ehm"),
                            # Jarvis požádá o zopakování a Clauda VŮBEC nevolá; [] = vypnuto,
                            # laď přes `jarvis reprompt-eval` (čistý, zdarma)
reprompt_min_words = 1      # reprompt jen když je věcných slov MÍŇ (1 = nezbylo žádné);
                            # bias do NEodmítání skutečné otázky
greeting = true             # při 1. výměně sezení (po dlouhé pauze) pozdrav dle denní doby
                            # místo acku („Dobré ráno, pane."); false = vždy jen ack
greeting_gap_s = 14400      # jak dlouhá pauza od poslední konverzace spustí pozdrav (4 h)
farewell = ["Dobrou noc, pane. Odpočiňte si.", "Nashledanou, pane."]
                            # „Jarvisi dobrou noc" → rozloučení bez volání Clauda; [] = vypnuto

[wm]
enabled = true              # hlasový Jarvis smí ovládat okna/klávesnici/myš — converse
                            # agent dostane Bash omezený na `jarvis wm …` a max_turns kol;
                            # CLI `jarvis wm` funguje vždy, tohle řídí jen hlasovou cestu
key_delay_ms = 12           # rozestup syntetických kláves (XTest) v ms
spawn_allowed = ["signal-desktop", "firefox"]
                            # programy, které smí `jarvis wm spawn` spouštět mimo terminál
                            # (hlasový agent, timery); přesná shoda — holé jméno = binárka
                            # v PATH, absolutní cesta = konkrétní soubor. Prázdné = hlasový
                            # spawn vypnutý. POZOR: shoduje se jen program, ne argumenty —
                            # dávej sem jen „listové" aplikace. Program, který umí spustit
                            # další příkaz (xterm -e, flatpak run, gtk-launch, env, ssh…),
                            # allowlist fakticky obchází. Neomezený spawn z terminálu navíc
                            # vyžaduje `export JARVIS_WM_UNRESTRICTED=1`

[meet]
enabled = true              # `jarvis meet <URL>` — Jarvis jako samostatný účastník Google Meet
                            # (vlastní Chrome + virtuální mikrofon/reproduktor)
chrome_bin = "google-chrome" # binárka prohlížeče (jméno v PATH nebo absolutní cesta)
display_name = "Jarvis"     # jméno bota v hovoru (vyplní se do „Vaše jméno")
mic_sink = "jarvis_mic_sink"   # null-sink pro Jarvisovu řeč → mikrofon hovoru
mic_source = "jarvis_mic"      # remap-source (mic_sink.monitor) — Chrome ho vybere jako mikrofon
ear_sink = "jarvis_ear_sink"   # null-sink pro zvuk hovoru → STT poslouchá jeho .monitor
profile_dir = ""            # profil dedikovaného Chrome; prázdné = <data_dir>/meet-profile.
                            # POZOR: pro schůzky blokující anonymní hosty se do tohoto profilu
                            # jednou přihlas Google účtem (jako u meeting-botů), pak už join projde
join_model = ""             # model vizuálního join-agenta; prázdné = default CLI
join_timeout_s = 180        # kolik smí trvat připojení vč. čekání na admit
join_max_turns = 20         # strop kol join-agenta (screenshot → akce → ověření)
transcribe = true           # průběžně přepisovat hovor do DB (utterances, source=meet)
summary = true              # po hovoru vygenerovat a odeslat shrnutí schůzky
summary_to = "email"        # kam: email | telegram | both | none

[sms]
enabled = false             # SMS přes Twilio (TWILIO_ACCOUNT_SID + TWILIO_AUTH_TOKEN
                            # v secrets.env); po zapnutí smí hlasový agent `jarvis sms`
from = ""                   # Messaging Service SID (MG…), E.164 číslo, nebo alfanumerický
                            # sender (max 11 znaků; na SMS pak nejde odpovědět)
to = ""                     # výchozí příjemce v E.164 (+420…) — typicky vlastní mobil
max_chars = 480             # pojistka délky (účtuje se po segmentech; s diakritikou ~70 znaků/segment)

[runbooks]
enabled = true              # fáze D: spouštění SCHVÁLENÝCH automatizací (runbooků).
                            # Návrh z `jarvis propose` schválíš `jarvis runbook approve <id>`
                            # (chce terminál) nebo z Telegramu; bez schválení neběží nic
voice_run = true            # hlasový agent smí `jarvis runbook run` (jen schválené;
                            # schvalovat hlasem nejde nikdy — mikrofonu se nevěří)
timeout_s = 600             # tvrdý strop běhu skriptu (pak SIGKILL celé process group)
max_output_chars = 4000     # ořez výstupu běhu ukládaného do DB
notify_sms = false          # nový návrh ohlásit SMS (vyžaduje zapnuté [sms]; stojí peníze)
telegram_approve = false    # schvalování na dálku: vlastní Telegram bot (@BotFather),
                            # TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID v secrets.env;
                            # bot poslouchá JEN tento chat — „schval N" / „zamítni N";
                            # nové návrhy tam ohlašuje sám. Poll à 5 min (runbooks timer)

[memory]
enabled = true              # dlouhodobá paměť: k promptu konverzace se přiloží relevantní
                            # útržky z minulých konverzací a promluv (FTS5 hybrid retrieval),
                            # ne jen posledních pár výměn podle času. false = jen recency
session_gap_s = 1800        # delší pauza mezi výměnami ukončí „sezení": navazující kontext
                            # se bere jen po tuto mezeru zpět (ráno se nezačíná s ocasem
                            # včerejška). 0 = bez omezení
retrieve_k = 4              # kolik relevantních útržků z minulosti vyhledat a přiložit
                            # (0 = vyhledávání vypnuté, zůstane jen navazující kontext)
snippet_max_chars = 200     # ořez délky jednoho přiloženého útržku (strop na tokeny)
consolidate = true          # fáze 2: noční konsolidace — claude -p vytáhne z denních
                            # konverzací a promluv TRVALÁ fakta o tobě (preference, vztahy,
                            # opakující se úkoly) do sémantické paměti. false = jen ruční
                            # `jarvis memory add`
consolidate_hour = 4        # po této lokální hodině (jednou/den) konsolidace v `jarvis run`
consolidate_model = "claude-haiku-4-5-20251001"  # levný model stačí (shrnutí textu)
facts_in_prompt = 8         # kolik faktů (připnutý profil + relevantní) přiložit k promptu
fact_half_life_days = 60    # poločas rozpadu důležitosti nepřipnutých faktů (0 = věčně)
vectors = true              # fáze 3: husté embeddingy (lokální e5 model přes onnxruntime)
                            # + fúze s FTS (RRF) — chytí synonyma/parafráze. Aktivuje se
                            # až po `jarvis memory embed` (stáhne model, naplní index);
                            # do té doby retrieval tiše jede jen na FTS
embed_model = "multilingual-e5-small"  # 384 dim, čeština OK
onnxruntime_lib = ""        # cesta k libonnxruntime.so; prázdné = autodetekce
                            # (ORT_DYLIB_PATH, pak pip onnxruntime v ~/.local)

[proactive]
enabled = false             # proaktivní vrstva: Jarvis z pozorování (vzory, běhy runbooků,
                            # promluvy) SÁM nabídne akci — nahlas u stolu, jinak Telegramem.
                            # Bias do ticha. false = čistě reaktivní (jen na oslovení).
                            # Invariant: nudge NIKDY nespustí nic neschváleného (jen informuje,
                            # nabídne běh schváleného runbooku, nebo návrh — ten pořád jde přes approve)
tick_s = 120                # jak často nudge smyčka v `jarvis run` vyhodnotí situaci (s)
quiet_from = 22             # klidové hodiny [od, do) lokálně (přes půlnoc, když od > do);
quiet_to = 8                #   od == do = žádné klidové okno
daily_max = 8               # tvrdý strop nabídek za den (pojistka proti nagování; 0 = vypnuto)
cooldown_min = 90           # min. rozestup (min) mezi nabídkami téhož druhu a předmětu
at_desk_idle_s = 120        # idle pod tímto = jsi u stolu → nahlas; nad (nebo bez vzorku) → Telegram
model = "claude-haiku-4-5-20251001"  # skeptický klasifikátor (stojí za to teď vyrušit?)
respect_budget = true       # klasifikátor i akce ctí denní strop (analysis.daily_budget_usd)
detect_pattern_ready = true # vzor překročil práh a nemá návrh → nabídni automatizaci (deterministické)
pattern_min_occurrences = 3 # min. výskytů vzoru pro nabídku
detect_runbook_failing = true  # schválený runbook opakovaně padá → nabídni log/vypnout (deterministické)
runbook_fail_streak = 2     # kolik posledních běhů musí selhat v řadě
detect_commitment = false   # závazek v řeči („pošlu…") → připomeň; potřebuje klasifikátor +
                            # kill-gate (`jarvis nudge-eval`) — zapni až po ověření false-accept
telegram_confirm = true     # nabídka na Telegram nese akci: „ano N" / „ne N" z ověřeného chatu
                            # ji provede/zahodí (reuse schvalovací smyčky runbooků)

[tasks]
enabled = true              # plánované interní úlohy: Jarvis si sám řídí housekeeping —
                            # kontrolu vlastních závislostí (binárky, modely, klíče, disk),
                            # údržbu DB a úklid snímků. Na rozdíl od runbooků nejsou
                            # z uživatelských skriptů (žádné schvalování) — jsou to
                            # zabudované funkce spouštěné plánem. false = nic se neplánuje
                            # (ruční `jarvis tasks run <name>` funguje dál).
                            # Plán jednotlivé úlohy: `jarvis tasks schedule <name> <spec>`
                            # (manual | every 6h | daily@04:15); výpis `jarvis tasks list`
notify_telegram = false     # najde-li úloha problém (chybějící závislost, málo místa),
                            # ohlásí ho na Telegram (klíče v secrets.env); jen INFORMUJE,
                            # sama nic neinstaluje — remediation příkaz je v hlášce
max_output_chars = 4000     # ořez výstupu běhu ukládaného do DB
min_disk_free_mb = 1024     # kontrola `deps` varuje, když ve data_dir zbývá míň místa

[retention]
screenshots_days = 7        # starší snímky se mažou (metadata a souhrny zůstávají)
